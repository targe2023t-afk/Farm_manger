workflows:
  android-workflow:
    name: Farmy Android Build
    max_build_duration: 60
    environment:
      node: 20.0.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          npm install

      - name: Build web app
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          echo "=== FILES IN BUILD DIR ==="
          ls -la
          echo "=== index.html exists? ==="
          test -f index.html && echo "YES index.html found" || echo "NO index.html missing"
          echo "=== src folder ==="
          ls -la src/ || echo "src folder missing"
          npm run build

      - name: Add Android platform
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          npx cap sync android

      - name: Copy Android config
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          if [ -f "android-config/AndroidManifest.xml" ]; then
            cp android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi
          if [ -f "android-config/build.gradle" ]; then
            cp android-config/build.gradle android/app/build.gradle
          fi

      - name: Build APK
        script: |
          cd $CM_BUILD_DIR/farmy-fixes/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - farmy-fixes/android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - your-email@gmail.com
        notify:
          success: true
          failure: true
