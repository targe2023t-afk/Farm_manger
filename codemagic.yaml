workflows:
  android-workflow:
    name: Farm Manager APK
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd farm-apk-builder/farm-apk-builder
          npm install

      - name: Build web app
        script: |
          cd farm-apk-builder/farm-apk-builder
          npm run build

      - name: Install Capacitor CLI
        script: |
          cd farm-apk-builder/farm-apk-builder
          npm install -g @capacitor/cli

      - name: Add Android platform
        script: |
          cd farm-apk-builder/farm-apk-builder
          npx cap add android || true

      - name: Sync Capacitor
        script: |
          cd farm-apk-builder/farm-apk-builder
          npx cap sync android

      - name: Fix build.gradle
        script: |
          python3 -c "
          import re
          path = 'farm-apk-builder/farm-apk-builder/android/app/build.gradle'
          f = open(path, 'r')
          content = f.read()
          f.close()
          content = re.sub(r'compileSdkVersion \d+', 'compileSdkVersion 34', content)
          content = re.sub(r'targetSdkVersion \d+', 'targetSdkVersion 34', content)
          content = re.sub(r'minSdkVersion \d+', 'minSdkVersion 22', content)
          f = open(path, 'w')
          f.write(content)
          f.close()
          print('Done!')
          "

      - name: Build Debug APK
        script: |
          cd farm-apk-builder/farm-apk-builder/android
          ./gradlew assembleDebug

    artifacts:
      - farm-apk-builder/farm-apk-builder/android/app/build/outputs/**/*.apk
