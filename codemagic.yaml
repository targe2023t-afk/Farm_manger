workflows:
  android-workflow:
    name: Farmy Android Build
    max_build_duration: 60
    environment:
      node: 20.0.0
      java: 17
    scripts:
      - name: Debug - show project structure
        script: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files in root ==="
          ls -la
          echo "=== Looking for package.json ==="
          find . -name "package.json" -not -path "*/node_modules/*" | head -20
          echo "=== CM_BUILD_DIR ==="
          echo $CM_BUILD_DIR

      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR
          npm install

      - name: Build web app
        script: |
          cd $CM_BUILD_DIR
          npm run build

      - name: Add Android platform
        script: |
          cd $CM_BUILD_DIR
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        script: |
          cd $CM_BUILD_DIR
          npx cap sync android

      - name: Copy Android config
        script: |
          cd $CM_BUILD_DIR
          if [ -f "android-config/AndroidManifest.xml" ]; then
            cp android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi
          if [ -f "android-config/build.gradle" ]; then
            cp android-config/build.gradle android/app/build.gradle
          fi

      - name: Build APK
        script: |
          cd $CM_BUILD_DIR/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - your-email@gmail.com
        notify:
          success: true
          failure: true
