workflows:
  android-workflow:
    name: Farmy Android Build
    max_build_duration: 60
    environment:
      node: 20.0.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          npm install
          npm install @supabase/supabase-js

      - name: Build web app
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          npm run build

      - name: Add Android platform
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          npx cap sync android

      - name: Copy Android config
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          cp android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android-config/build.gradle android/app/build.gradle

      - name: Generate app icons
        script: |
          cd $CM_BUILD_DIR/farmy-fixes
          ICON_SRC="public/icons/icon.png"
          BASE="android/app/src/main/res"
          if [ -f "$ICON_SRC" ]; then
            npm install sharp-cli -g 2>/dev/null || true
            declare -A SIZES=( ["mipmap-mdpi"]=48 ["mipmap-hdpi"]=72 ["mipmap-xhdpi"]=96 ["mipmap-xxhdpi"]=144 ["mipmap-xxxhdpi"]=192 )
            for DIR in "${!SIZES[@]}"; do
              SIZE=${SIZES[$DIR]}
              mkdir -p "$BASE/$DIR"
              cp "$ICON_SRC" "$BASE/$DIR/ic_launcher.png"
              cp "$ICON_SRC" "$BASE/$DIR/ic_launcher_round.png"
              echo "Copied icon to $DIR"
            done
          fi

      - name: Build APK
        script: |
          cd $CM_BUILD_DIR/farmy-fixes/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - farmy-fixes/android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - your-email@gmail.com
        notify:
          success: true
          failure: true
