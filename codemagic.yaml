workflows:
  android-workflow:
    name: Farm Manager APK
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd farm-apk-builder
          npm install

      - name: Build web app
        script: |
          cd farm-apk-builder
          npm run build

      - name: Install Capacitor CLI
        script: |
          cd farm-apk-builder
          npm install -g @capacitor/cli

      - name: Add Android platform
        script: |
          cd farm-apk-builder
          npx cap add android || true

      - name: Sync Capacitor
        script: |
          cd farm-apk-builder
          npx cap sync android

      - name: Build Debug APK
        script: |
          cd farm-apk-builder/android
          ./gradlew assembleDebug

    artifacts:
      - farm-apk-builder/android/app/build/outputs/**/*.apk
