workflows:
  android-workflow:
    name: Farm Manager APK
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
    scripts:
      - name: Find package.json
        script: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files here ==="
          ls -la
          echo "=== Looking for package.json ==="
          find . -name "package.json" -not -path "*/node_modules/*"

    artifacts:
      - android/app/build/outputs/**/*.apk
