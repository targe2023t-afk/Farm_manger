workflows:
  android-workflow:
    name: Farmy Android Build
    max_build_duration: 60
    environment:
      node: 20.0.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Add Android platform
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Copy Android config
        script: |
          if [ -f "android-config/AndroidManifest.xml" ]; then
            cp android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi
          if [ -f "android-config/build.gradle" ]; then
            cp android-config/build.gradle android/app/build.gradle
          fi
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - your-email@gmail.com
        notify:
          success: true
          failure: true
