# تأكد إنك في الـ root
cd $CM_BUILD_DIR

# لو المشروع في subfolder، حدد المسار الصح
# مثلاً لو اسم المجلد farm-manager:
# cd farm-manager

# ثبّت الباكدجات
npm install

# ابنِ المشروع
npm run build

# زامن مع Capacitor
npx cap sync android

# انسخ الـ config
cp android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml || true
cp android-config/build.gradle android/app/build.gradle || true

# ابنِ APK
cd android
chmod +x gradlew
./gradlew assembleDebug
