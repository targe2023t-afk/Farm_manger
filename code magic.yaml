workflows:
  android-workflow:
    name: Farm Manager APK
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Add Android platform
        script: |
          npx cap add android || true

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Copy AndroidManifest
        script: |
          cp android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml || true

      - name: Set gradlew permission
        script: chmod +x android/gradlew

      - name: Build Debug APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
