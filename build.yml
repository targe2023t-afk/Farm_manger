name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install dependencies
        run: |
          cd Farm_manger
          npm install
          npm install @supabase/supabase-js@2

      - name: Build web app
        run: |
          cd Farm_manger
          npm run build

      - name: Add Capacitor Android
        run: |
          cd Farm_manger
          npx cap add android || true

      - name: Sync Capacitor
        run: |
          cd Farm_manger
          npx cap sync android

      - name: Copy Android configs
        run: |
          cd Farm_manger
          cp android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android-config/build.gradle android/app/build.gradle

      - name: Make gradlew executable
        run: |
          cd Farm_manger/android
          chmod +x gradlew

      - name: Build APK
        run: |
          cd Farm_manger/android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: farmy-apk
          path: Farm_manger/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
